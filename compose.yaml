services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: react-analytics-dashboard-app
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    networks:
      - task_api_network

networks:
  task_api_network:
    external: true
